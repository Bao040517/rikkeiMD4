spring.application.name=patient-web-service

# ==========================================
# PostgreSQL Configuration
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/MD4S11
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Bài 2: Cấu hình cấp độ Log
# ==========================================
# Log toàn bộ ứng dụng ở mức INFO
logging.level.root=INFO

# Log Hibernate/JPA ở mức DEBUG (xem câu lệnh SQL)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log package com.medical.service ở mức TRACE
logging.level.com.medical.service=TRACE

# ==========================================
# Bài 3: Lưu Log vào File
# ==========================================
logging.file.name=logs/patient_web_service.log
logging.logback.rollingpolicy.max-file-size=2MB
logging.logback.rollingpolicy.max-history=7
